name: Java CI for Bai 3

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # THÊM DÒNG NÀY ĐỂ TRỎ VÀO BÀI 3
    defaults:
      run:
        working-directory: ./Bai9.3

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test
        # Lệnh này giờ sẽ chạy bên trong thư mục Bai9.3
        run: mvn clean test