name: Java CI for Bai 4

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Ép GitHub Actions chỉ chui vào thư mục Bai9.4 để chạy lệnh
    defaults:
      run:
        working-directory: ./Bai9.4

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build and Test with Maven
        run: mvn clean test